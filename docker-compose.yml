# ==================================================================
# 企业级财务智能体 - MVP Docker Compose
# 默认启动：Ollama + 后端 API + 前端（复用 Dify 的 PostgreSQL/Redis/MinIO）
# 说明：
#   - 默认与 Dify 一起使用，复用 Dify 的 db_postgres / redis / minio 服务
#   - 如需独立运行（不启动 Dify），使用 docker compose --profile local-db up -d
#   - 需要 Celery 异步任务时：docker compose --profile celery up -d
#   - 默认无需单独 Redis / MinIO，文档/报告/任务本地执行
# ==================================================================

name: financial-agent

services:
  # ----------------------------------------------------------------
  # 数据库：PostgreSQL（可选，仅不启动 Dify 时需要）
  # ----------------------------------------------------------------
  db_postgres:
    image: postgres:16-alpine
    container_name: financial-agent-postgres
    profiles:
      - local-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-difyai123456}
      POSTGRES_DB: ${DB_DATABASE:-dify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-h",
          "db_postgres",
          "-U",
          "${DB_USERNAME:-postgres}",
          "-d",
          "${DB_DATABASE:-dify}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # ----------------------------------------------------------------
  # 缓存 / 消息队列：Redis（可选，仅 TASK_BACKEND=celery 时需要）
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: financial-agent-redis
    profiles:
      - celery
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-difyai123456}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai123456}
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - default
      - dify
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # ----------------------------------------------------------------
  # 本地大模型服务：Ollama（可选，当前核心链路不强制依赖）
  # ----------------------------------------------------------------
  fa-ollama:
    image: ollama/ollama:latest
    container_name: financial-agent-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - default
      - dify
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # ----------------------------------------------------------------
  # 对象存储：MinIO（可选，仅 STORAGE_BACKEND=minio 时需要）
  # ----------------------------------------------------------------
  fa-minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: financial-agent-minio
    profiles:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - default
      - dify
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # 财务智能体后端 API
  # ----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial-agent-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:difyai123456@db_postgres:5432/dify}
      SECRET_KEY: ${SECRET_KEY}
      # 默认本地存储与同步任务，无需 Redis / MinIO
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-/app/data/storage}
      TASK_BACKEND: ${TASK_BACKEND:-sync}
      # Redis 仅在 TASK_BACKEND=celery 时需要
      REDIS_URL: ${REDIS_URL:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
      # MinIO 仅在 STORAGE_BACKEND=minio 时需要
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-fa-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin123}}
      MINIO_BUCKET: ${MINIO_BUCKET:-financial-agent}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://fa-ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      TEXT2SQL_BACKEND: ${TEXT2SQL_BACKEND:-rule}
      AGENT_INTENT_MODE: ${AGENT_INTENT_MODE:-llm}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-qwen2.5:7b}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-512}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      MINERU_API_URL: ${MINERU_API_URL:-}
      MINERU_TIMEOUT: ${MINERU_TIMEOUT:-120}
      DIFY_TOOL_API_KEY: ${DIFY_TOOL_API_KEY:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - default
      - dify
    volumes:
      # 本地存储持久化
      - backend_storage:${STORAGE_LOCAL_ROOT:-/app/data/storage}
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # 财务智能体后端 Celery Worker（可选，仅 TASK_BACKEND=celery 时需要）
  # ----------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial-agent-worker
    profiles:
      - celery
    command: ["python", "scripts/worker.py"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:difyai123456@db_postgres:5432/dify}
      SECRET_KEY: ${SECRET_KEY}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-/app/data/storage}
      TASK_BACKEND: ${TASK_BACKEND:-celery}
      REDIS_URL: ${REDIS_URL:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-fa-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin123}}
      MINIO_BUCKET: ${MINIO_BUCKET:-financial-agent}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://fa-ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      TEXT2SQL_BACKEND: ${TEXT2SQL_BACKEND:-rule}
      AGENT_INTENT_MODE: ${AGENT_INTENT_MODE:-llm}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-qwen2.5:7b}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-512}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      MINERU_API_URL: ${MINERU_API_URL:-}
      MINERU_TIMEOUT: ${MINERU_TIMEOUT:-120}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - dify
    volumes:
      - backend_storage:${STORAGE_LOCAL_ROOT:-/app/data/storage}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.celery_app inspect ping -d celery@financial-agent-worker --timeout 5 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # 前端页面（React + Nginx）
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financial-agent-frontend
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - dify
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  default:
    driver: bridge
  dify:
    name: dify_default
    external: true

volumes:
  ollama_data:
  minio_data:
  postgres_data:
  redis_data:
  backend_storage:
