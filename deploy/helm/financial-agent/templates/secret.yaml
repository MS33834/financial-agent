{{- if not .Values.externalSecrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "financial-agent.fullname" . }}
  labels:
    {{- include "financial-agent.labels" (dict "root" .) | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
