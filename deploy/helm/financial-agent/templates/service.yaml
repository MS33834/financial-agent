{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "financial-agent.fullname" . }}-backend
  labels:
    {{- include "financial-agent.labels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "financial-agent.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
{{- end }}
---
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "financial-agent.fullname" . }}-frontend
  labels:
    {{- include "financial-agent.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "financial-agent.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
{{- end }}
