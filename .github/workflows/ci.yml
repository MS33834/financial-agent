name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        working-directory: backend
        run: python -m ruff check app tests

      - name: Run mypy
        working-directory: backend
        run: python -m mypy app tests

      - name: Run tests
        working-directory: backend
        env:
          APP_ENV: testing
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-32-char-long
          STORAGE_BACKEND: local
          STORAGE_LOCAL_ROOT: ./test_data/storage
          TASK_BACKEND: sync
          RATE_LIMIT_ENABLED: false
        run: python -m pytest -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Run unit tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

  compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config > /dev/null

  build-backend:
    name: Build Backend Image
    needs: [backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      scan_tag: ${{ steps.version.outputs.scan_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        run: |
          IMAGE_NAME="$(echo '${{ github.repository_owner }}/financial-agent-backend' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            TAG=sha-${GITHUB_SHA::7}
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            TAG=pr-${{ github.event.number }}
          else
            TAG=sha-${GITHUB_SHA::7}
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "scan_tag=${REGISTRY,,}/${IMAGE_NAME,,}:${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

  build-frontend:
    name: Build Frontend Image
    needs: [frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      scan_tag: ${{ steps.version.outputs.scan_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        run: |
          IMAGE_NAME="$(echo '${{ github.repository_owner }}/financial-agent-frontend' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            TAG=sha-${GITHUB_SHA::7}
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            TAG=pr-${{ github.event.number }}
          else
            TAG=sha-${GITHUB_SHA::7}
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "scan_tag=${REGISTRY,,}/${IMAGE_NAME,,}:${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

  scan-backend:
    name: Scan Backend Image
    needs: [build-backend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      TRIVY_EXIT_CODE: ${{ vars.TRIVY_EXIT_CODE || '0' }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build-backend.outputs.scan_tag }}
          format: json
          output: trivy-backend-results.json
          exit-code: ${{ env.TRIVY_EXIT_CODE }}
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-results
          path: trivy-backend-results.json
          if-no-files-found: ignore

  scan-frontend:
    name: Scan Frontend Image
    needs: [build-frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      TRIVY_EXIT_CODE: ${{ vars.TRIVY_EXIT_CODE || '0' }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build-frontend.outputs.scan_tag }}
          format: json
          output: trivy-frontend-results.json
          exit-code: ${{ env.TRIVY_EXIT_CODE }}
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-results
          path: trivy-frontend-results.json
          if-no-files-found: ignore

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint deploy/helm/financial-agent

      - name: Helm template
        run: helm template financial-agent deploy/helm/financial-agent
